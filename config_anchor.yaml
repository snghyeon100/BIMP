NetEase:
  data_path: './datasets'
  batch_size_train: 2048
  batch_size_test: 2048
  topk: [10, 20, 40, 80]
  neg_num: 1

  embedding_sizes: [64]
  num_layerss: [2]

  # AnchorRadar-specific
  anchor_lambdas: [0.1]   # lambda: Stage2 global score weight
  anchor_temps: [0.3]     # T: softmax temperature (< 1 = sharper)
  mlp_hidden_size: 64

  lrs: [1.0e-3]
  l2_regs: [1.0e-5]

  # Regularization weights
  c_lambdas: [0.0]        # Contrastive loss
  c_temps: [0.2]
  ent_lambdas: [0.1]      # Entropy regularization

  epochs: 50
  test_interval: 5

  # Eval memory
  rerank_k: 500
  eval_user_chunk: 64

  # Item-Overlap Hard Negative Sampling
  hard_neg_prob: 0.5     # probability of using overlap-based hard negative
  hard_neg_top_k: 20     # precomputed pool size per bundle


