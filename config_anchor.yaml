NetEase:
  data_path: './datasets'
  batch_size_train: 2048
  batch_size_test: 2048
  topk: [10, 20, 40, 80]
  neg_num: 1

  embedding_sizes: [64]
  num_layerss: [2]

  # AnchorRadar-specific
  anchor_lambdas: [0.1]   # λ: Stage2 global score weight
  anchor_temps: [1.0]     # T: softmax temperature (< 1 = sharper, > 1 = softer)
  mlp_hidden_size: 64

  lrs: [1.0e-3]
  l2_regs: [1.0e-5]

  # Contrastive loss (c_lambda=0 → BPR-only, computation fully skipped)
  c_lambdas: [0.05]
  c_temps: [0.2]

  epochs: 50
  test_interval: 5

  # Eval memory: peak = [eval_user_chunk × rerank_k × max_T × (5D+5)]
  rerank_k: 500
  eval_user_chunk: 64


